services:
  postgres:
    image: postgres:16-alpine
    container_name: reliabilityops-postgres
    environment:
      POSTGRES_USER: reliabilityops
      POSTGRES_PASSWORD: reliabilityops
      POSTGRES_DB: reliabilityops
    ports:
      - "5432:5432"
    volumes:
      - reliabilityops_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliabilityops -d reliabilityops"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reliabilityops-api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://reliabilityops:reliabilityops@postgres:5432/reliabilityops?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: reliabilityops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml
    depends_on:
      - api
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: reliabilityops-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  grafana:
    image: grafana/grafana:11.1.0
    container_name: reliabilityops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - reliabilityops_grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus



volumes:
  reliabilityops_pgdata:
  reliabilityops_grafana_data:
  